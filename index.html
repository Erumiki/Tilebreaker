<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tilebreaker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #08090d;
            color: #f3e6c8;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
        }

        #gameShell {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #071017;
            background-image:
                linear-gradient(90deg, rgba(214, 162, 92, 0.08) 1px, transparent 1px),
                linear-gradient(0deg, rgba(99, 182, 255, 0.045) 1px, transparent 1px),
                radial-gradient(circle at 50% 50%, rgba(214, 162, 92, 0.06) 0 1px, transparent 1px);
            background-size: 32px 32px, 32px 32px, 96px 96px;
            background-position: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        #loadingScreen {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: grid;
            place-items: center;
            padding: 28px;
            background:
                linear-gradient(180deg, rgba(5, 9, 17, 0.72), rgba(5, 9, 17, 0.92)),
                transparent;
            transition: opacity 180ms ease, visibility 180ms ease;
        }

        body.is-ready #loadingScreen {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-card {
            width: min(360px, 100%);
            border: 2px solid rgba(214, 162, 92, 0.62);
            background: rgba(8, 16, 24, 0.88);
            padding: 22px 24px;
            text-align: center;
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.4);
        }

        .loading-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0;
            color: #ffd27a;
        }

        .loading-status {
            margin-top: 10px;
            min-height: 20px;
            font-size: 14px;
            color: #bfd2df;
        }

        .loading-bar {
            position: relative;
            height: 4px;
            margin-top: 18px;
            overflow: hidden;
            background: rgba(99, 182, 255, 0.16);
        }

        .loading-bar::before {
            content: "";
            position: absolute;
            inset: 0;
            width: 42%;
            background: #e45c4f;
            animation: loading-scan 1.1s ease-in-out infinite;
        }

        body.has-boot-error .loading-bar::before {
            width: 100%;
            animation: none;
            background: #ff8b9c;
        }

        #fullscreenButton {
            position: fixed;
            z-index: 12;
            top: max(12px, env(safe-area-inset-top));
            right: max(12px, env(safe-area-inset-right));
            width: 42px;
            height: 42px;
            border: 1px solid rgba(255, 210, 122, 0.64);
            background: rgba(6, 16, 26, 0.66);
            color: #ffd27a;
            cursor: pointer;
        }

        #fullscreenButton::before,
        #fullscreenButton::after {
            content: "";
            position: absolute;
            inset: 10px;
            border-color: currentColor;
            opacity: 0.92;
        }

        #fullscreenButton::before {
            border-top: 2px solid;
            border-left: 2px solid;
        }

        #fullscreenButton::after {
            border-right: 2px solid;
            border-bottom: 2px solid;
        }

        #fullscreenButton:disabled {
            cursor: default;
            opacity: 0.42;
        }

        #fullscreenButton.is-active::before {
            inset: 14px 8px 8px 14px;
        }

        #fullscreenButton.is-active::after {
            inset: 8px 14px 14px 8px;
        }

        @keyframes loading-scan {
            0% {
                transform: translateX(-115%);
            }

            100% {
                transform: translateX(250%);
            }
        }
    </style>
</head>
<body>
    <main id="gameShell" aria-label="Tilebreaker game">
        <canvas id="game"></canvas>
        <button id="fullscreenButton" type="button" aria-label="Fullscreen" title="Fullscreen"></button>
    </main>
    <div id="loadingScreen" role="status" aria-live="polite">
        <div class="loading-card">
            <div class="loading-title">Tilebreaker</div>
            <div id="loadingStatus" class="loading-status">Loading archive...</div>
            <div class="loading-bar" aria-hidden="true"></div>
        </div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
